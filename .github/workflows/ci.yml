name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - run: npm run core:setup

      - run: npm run check

      # Build + stage the host iris-core sidecar so packaging resources
      # are present during desktop checks.
      - run: npm run core:build:binary

      - run: npm --workspace apps/desktop run stage:core-sidecar

      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - run: npm --workspace apps/desktop run tauri info

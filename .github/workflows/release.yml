name: Release

# Builds, signs, and notarizes the macOS desktop app and publishes a GitHub
# Release with Tauri updater artifacts (`*.app.tar.gz` + `.sig`) and a merged
# `latest.json`. The installed app's updater polls
# https://github.com/scottmcpherson/iris/releases/latest/download/latest.json
# (configured in apps/desktop/src-tauri/tauri.conf.json).
#
# Cut a release by bumping `version` in tauri.conf.json, committing, then pushing
# a matching tag, e.g.  git tag release-0.2.0 && git push origin release-0.2.0
#
# Release builds are universal macOS artifacts: one universal Tauri app bundles
# native arm64 and x86_64 PyInstaller Iris Core sidecars.

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to (e.g. release-0.2.0)"
        required: true

jobs:
  sidecar:
    name: sidecar-${{ matrix.arch }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            arch: x86_64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Set up iris-core
        run: npm run core:setup

      - name: Build iris-core sidecar binary
        run: npm run core:build:binary

      - name: Stage iris-core sidecar for Tauri
        run: npm --workspace apps/desktop run stage:core-sidecar
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: iris-core-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/iris-core-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: macos-universal
    needs: sidecar
    permissions:
      contents: write
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          pattern: iris-core-*
          path: apps/desktop/src-tauri/binaries
          merge-multiple: true

      - name: Verify staged universal sidecars
        run: npm --workspace apps/desktop run verify:universal-sidecars

      - name: Build, sign, notarize, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater (minisign) signing — pairs with `plugins.updater.pubkey`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing (cert imported into a temp keychain on CI).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization (required so Gatekeeper lets the updated app launch).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          args: --target universal-apple-darwin --config src-tauri/tauri.release.conf.json
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Iris v__VERSION__"
          releaseDraft: false
          prerelease: false

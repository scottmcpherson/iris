name: Release

# Builds, signs, and notarizes the macOS desktop app and publishes a GitHub
# Release with Tauri updater artifacts (`*.app.tar.gz` + `.sig`) and a merged
# `latest.json`. The installed app's updater polls
# https://github.com/scottmcpherson/iris/releases/latest/download/latest.json
# (configured in apps/desktop/src-tauri/tauri.conf.json).
#
# Cut a release by bumping `version` in tauri.conf.json, committing, then pushing
# a matching tag, e.g.  git tag release-0.2.0 && git push origin release-0.2.0
#
# Release builds are universal macOS artifacts: the Tauri app binary and the
# bundled PyInstaller Iris Core sidecar both include arm64 and x86_64 slices.

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to (e.g. release-0.2.0)"
        required: true

jobs:
  release:
    name: macos-universal
    permissions:
      contents: write
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Python 3.11 universal2
        run: |
          curl -fsSL https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg -o /tmp/python-3.11.9-macos11.pkg
          sudo installer -pkg /tmp/python-3.11.9-macos11.pkg -target /
          /Library/Frameworks/Python.framework/Versions/3.11/bin/python3.11 -m venv iris-core/.venv
          lipo -archs iris-core/.venv/bin/python

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Set up iris-core (Python venv)
        run: npm run core:setup

      - name: Build iris-core sidecar binary
        run: npm run core:build:binary:universal

      - name: Stage iris-core sidecar for Tauri
        run: npm --workspace apps/desktop run stage:core-sidecar
        env:
          TAURI_ENV_TARGET_TRIPLE: universal-apple-darwin

      - name: Build, sign, notarize, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater (minisign) signing — pairs with `plugins.updater.pubkey`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing (cert imported into a temp keychain on CI).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization (required so Gatekeeper lets the updated app launch).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          args: --target universal-apple-darwin --config src-tauri/tauri.release.conf.json
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Iris v__VERSION__"
          releaseDraft: false
          prerelease: false

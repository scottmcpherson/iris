plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.nousresearch.iris.ssh'
version = '0.1.0'

android {
  namespace "com.nousresearch.iris.ssh"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.github.mwiede:jsch:0.2.17'
}
